services:
  - type: web
    name: kc-floating-chatbot
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    # In Render Dashboard → your service → Settings → Build & Deploy:
    #   Build Command: npm install && npm run build
    #   Start Command: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DRY_RUN
        value: "true"
      - key: SUPPORT_TO_EMAIL
        value: techsupport@kingdomcitizen.app
      - key: EMAIL_FROM
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: BUBBLE_API_URL
        sync: false
      - key: BUBBLE_API_TOKEN
        sync: false
